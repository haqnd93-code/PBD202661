    let ting = getCurrentTingkatan();

    let ting = getCurrentTingkatan();

    let customNames = examNamesCustom[ting];
    
    if (customNames && customNames.length === defaultNames.length) {

    return defaultNames;

// Fungsi untuk menukar susunan peperiksaan
function swapExamNames(idx1, idx2) {
    let ting = getCurrentTingkatan();
    let currentNames = getCurrentExamNamesWithCustom();
    
    if (idx2 >= currentNames.length) return;
    
    let temp = currentNames[idx1];
    currentNames[idx1] = currentNames[idx2];
    currentNames[idx2] = temp;
    
    // Update custom names
    examNamesCustom[ting] = [...currentNames];

    bukaModalEditExamNames();

    let ting = getCurrentTingkatan();
    let defaultNames = getExamNamesByTingkatan(ting);
    let newNames = [];
    
    for (let i = 0; i < defaultNames.length; i++) {
        let newName = document.getElementById(`examName_${i}`)?.value.trim();
        if (newName && newName !== "") {
            newNames.push(newName);
        } else {
            newNames.push(defaultNames[i]);
        }
    }
    
    // Simpan nama baru ke examNamesCustom (hanya nama, tanpa ubah data)
    examNamesCustom[ting] = newNames;

// Fungsi untuk mendapatkan gred berdasarkan markah (Gred SPM sebenar)
function getGredSPM(marks, tingkatan) {
    // Gred SPM hanya untuk Tingkatan 4 dan 5
    if (tingkatan !== "Tingkatan 4" && tingkatan !== "Tingkatan 5") {
        return null;
    }
    
    // Gred SPM mengikut Lembaga Peperiksaan Malaysia
    if (marks >= 90) return { gred: "A+", point: 4.00, warna: "#10b981", desc: "Cemerlang Tertinggi" };
    if (marks >= 80) return { gred: "A", point: 4.00, warna: "#22c55e", desc: "Cemerlang" };
    if (marks >= 70) return { gred: "A-", point: 3.67, warna: "#34d399", desc: "Kepujian Tertinggi" };
    if (marks >= 65) return { gred: "B+", point: 3.33, warna: "#3b82f6", desc: "Kepujian" };
    if (marks >= 60) return { gred: "B", point: 3.00, warna: "#60a5fa", desc: "Kepujian" };
    if (marks >= 55) return { gred: "C+", point: 2.67, warna: "#f59e0b", desc: "Kepujian Rendah" };
    if (marks >= 50) return { gred: "C", point: 2.33, warna: "#fbbf24", desc: "Sederhana" };
    if (marks >= 45) return { gred: "D", point: 2.00, warna: "#f97316", desc: "Lemah" };
    if (marks >= 40) return { gred: "E", point: 1.67, warna: "#ef4444", desc: "Lemah" };
    return { gred: "G", point: 0.00, warna: "#dc2626", desc: "Gagal" };
}

// Fungsi untuk mendapatkan gred mengikut tingkatan (guna sistem berbeza untuk tingkatan rendah)
function getGredByTingkatan(marks, tingkatan) {

}

        async function pushStateToCloud() {
            if (!cloudEnabled || !firestoreDocRef || applyingRemoteUpdate) return;
            try {
                await firestoreDocRef.set(
                    {
                        ...buildStatePayload(),
                        updatedAt: firebase.firestore.FieldValue.serverTimestamp()
                    },
                    { merge: true }
                );
                setSyncStatus("Cloud: Diselaraskan", "ok");
            } catch (err) {
                console.error("Gagal simpan ke cloud:", err);
                setSyncStatus("Cloud: Ralat simpan", "error");
            }
        }

        function scheduleCloudSave() {
            if (!cloudEnabled || applyingRemoteUpdate) return;
            if (saveDebounceTimer) clearTimeout(saveDebounceTimer);
            setSyncStatus("Cloud: Menyimpan...", "warn");
            saveDebounceTimer = setTimeout(() => {
                pushStateToCloud();
            }, 600);
        }

        function subscribeCloudRealtime() {
            if (!firestoreDocRef) return;
            if (cloudUnsubscribe) cloudUnsubscribe();
            cloudUnsubscribe = firestoreDocRef.onSnapshot(
                (snapshot) => {
                    if (!snapshot.exists) return;
                    const remoteData = snapshot.data();
                    if (!remoteData) return;
                    applyingRemoteUpdate = true;
                    try {
                        applyStatePayload(remoteData);
                        saveLocalState();
                        refreshSelectors();
                        renderCurrentPage();
                        if (typeof refreshSettingsSelects === "function") refreshSettingsSelects();
                        setSyncStatus("Cloud: Kemas kini langsung aktif", "ok");
                    } finally {
                        applyingRemoteUpdate = false;
                    }
                },
                (err) => {
                    console.error("Realtime sync gagal:", err);
                    setSyncStatus("Cloud: Realtime terganggu", "error");
                }
            );
        }

        async function ensureFirebaseAuth() {
            if (!firebaseAuth) {
                firebaseAuth = firebase.auth();
            }
            try {
                await firebaseAuth.setPersistence(firebase.auth.Auth.Persistence.LOCAL);
            } catch (err) {
                console.warn("Persistence auth tidak dapat ditetapkan:", err);
            }
            if (firebaseAuth.currentUser) {
                authenticatedUser = firebaseAuth.currentUser;
                return authenticatedUser;
            }
            const credential = await firebaseAuth.signInAnonymously();
            authenticatedUser = credential.user || firebaseAuth.currentUser;
            return authenticatedUser;
        }

        function getUserScopedDocRef(userId) {
            return firestoreDb
                .collection(FIRESTORE_USERS_COLLECTION)
                .doc(userId)
                .collection(FIRESTORE_USER_SUBCOLLECTION)
                .doc(FIRESTORE_DOCUMENT);
        }

        async function resolveInitialCloudData() {
            const scopedSnapshot = await firestoreDocRef.get();
            if (scopedSnapshot.exists) {
                applyStatePayload(scopedSnapshot.data());
                saveLocalState();
                setSyncStatus("Cloud: Data dimuat", "ok");
                return;
            }

            let seedPayload = buildStatePayload();
            let seededFromLegacy = false;
            const legacyRef = firestoreDb.collection(FIRESTORE_LEGACY_COLLECTION).doc(FIRESTORE_LEGACY_DOCUMENT);
            const legacySnapshot = await legacyRef.get();
            if (legacySnapshot.exists) {
                seedPayload = { ...seedPayload, ...legacySnapshot.data() };
                applyStatePayload(seedPayload);
                saveLocalState();
                seededFromLegacy = true;
            }

            await firestoreDocRef.set(
                {
                    ...seedPayload,
                    createdAt: firebase.firestore.FieldValue.serverTimestamp(),
                    updatedAt: firebase.firestore.FieldValue.serverTimestamp(),
                    migratedFromLegacy: seededFromLegacy
                },
                { merge: true }
            );
            setSyncStatus(seededFromLegacy ? "Cloud: Data lama dimigrasi" : "Cloud: Dokumen baru dibuat", "ok");
        }

        async function initFirebaseSync() {
            if (typeof firebase === "undefined") {
                setSyncStatus("Cloud: SDK tidak dimuat", "error");
                return;
            }
            try {
                if (!firebase.apps.length) {
                    firebase.initializeApp(FIREBASE_CONFIG);
                }
                const user = await ensureFirebaseAuth();
                if (!user || !user.uid) {
                    throw new Error("Pengguna Firebase tidak sah.");
                }
                firestoreDb = firebase.firestore();
                firestoreDocRef = getUserScopedDocRef(user.uid);
                cloudEnabled = true;
                setSyncStatus("Cloud: Menyambung akaun...", "warn");
                await resolveInitialCloudData();
                subscribeCloudRealtime();
            } catch (err) {
                console.error("Firebase init gagal:", err);
                cloudEnabled = false;
                setSyncStatus("Cloud: Guna local sahaja", "error");
            }
        }

        function formatRemainingTime(ms) {
            if (ms <= 0) return "0 minit";
            let totalMinutes = Math.ceil(ms / 60000);
            let days = Math.floor(totalMinutes / (60 * 24));
            let hours = Math.floor((totalMinutes % (60 * 24)) / 60);
            let minutes = totalMinutes % 60;
            let parts = [];
            if (days > 0) parts.push(`${days} hari`);
            if (hours > 0) parts.push(`${hours} jam`);
            if (minutes > 0) parts.push(`${minutes} minit`);
            return parts.slice(0, 2).join(" ");
        }

        function getAdminExpiryReminderInfo() {
            normalizeAdminLockState();
            let now = new Date();

            if (adminSystemLock.mode === "schedule") {
                let start = getScheduleStartDate();
                let end = getScheduleEndDate();
                if (!start || !end || end < start) return null;
                if (now < start || now > end) return null;
                let msLeft = end.getTime() - now.getTime();
                if (msLeft <= 0 || msLeft > ADMIN_REMINDER_WINDOW_MS) return null;
                return {
                    endDate: end,
                    msLeft: msLeft,
                    modeLabel: "Jadual Buka",
                    subjectLabel: "tempoh sistem dibuka"
                };
            }

            if (!adminSystemLock.enabled || !adminSystemLock.untilDate) return null;
            let endDate = new Date(adminSystemLock.untilDate + "T23:59:59");
            if (Number.isNaN(endDate.getTime())) return null;
            let msLeft = endDate.getTime() - now.getTime();
            if (msLeft <= 0 || msLeft > ADMIN_REMINDER_WINDOW_MS) return null;
            return {
                endDate: endDate,
                msLeft: msLeft,

        function isGuruLockedByAdmin() {
            normalizeAdminLockState();
            if (!(currentUser && currentUser.role === "guru")) return false;
            if (adminSystemLock.mode === "schedule") {
                let now = new Date();
                let start = getScheduleStartDate();
                let end = getScheduleEndDate();
                if (!start || !end) return true;
                if (end < start) return true;
                if (now < start) return true;
                if (now > end) return true;
                return false;
            }
            if (!adminSystemLock.enabled) return false;
            if (!adminSystemLock.untilDate) return true;
            return getTodayDateKey() <= adminSystemLock.untilDate;
        }

        function getAdminLockStatusMessage() {
            normalizeAdminLockState();
            if (adminSystemLock.mode === "schedule") {
                let now = new Date();
                let start = getScheduleStartDate();
                let end = getScheduleEndDate();
                if (!start || !end) return "Mod Jadual Buka dipilih. Sila tetapkan Tarikh/Masa Mula Buka dan Tamat Buka.";
                if (end < start) return "Julat jadual tidak sah: Tarikh/Masa akhir lebih awal daripada mula.";
                if (now < start) return `Jadual belum bermula. Sistem akan dibuka pada ${formatDateTimeMs(adminSystemLock.startAt)} dan tamat pada ${formatDateTimeMs(adminSystemLock.endAt)}.`;
                if (now > end) return `Tempoh sistem dibuka tamat pada ${formatDateTimeMs(adminSystemLock.endAt)}. Sistem kini dikunci semula.`;
                return `Sistem sedang dibuka mengikut jadual hingga ${formatDateTimeMs(adminSystemLock.endAt)}.`;
            }
            if (!adminSystemLock.enabled) return "Mod Manual: Sistem dibuka (OFF).";
            if (!adminSystemLock.untilDate) return "Mod Manual: Sistem dikunci (ON) tanpa tarikh tamat.";
            if (getTodayDateKey() <= adminSystemLock.untilDate) {
                return `Mod Manual: Sistem dikunci sehingga ${formatDateMs(adminSystemLock.untilDate)}.`;
            }
            return `Mod Manual: Tarikh kunci tamat pada ${formatDateMs(adminSystemLock.untilDate)}. Sistem dibuka semula.`;

        function applyAdminSettingsUI() {
            let modeManualEl = document.querySelector('input[name="adminLockMode"][value="manual"]');
            let modeScheduleEl = document.querySelector('input[name="adminLockMode"][value="schedule"]');
            let enabledEl = document.getElementById("adminLockEnabled");
            let dateEl = document.getElementById("adminLockUntil");
            let startEl = document.getElementById("adminLockStartAt");
            let endEl = document.getElementById("adminLockEndAt");
            let badge = document.getElementById("adminLockStatusBadge");
            normalizeAdminLockState();
            if (modeManualEl) modeManualEl.checked = adminSystemLock.mode === "manual";
            if (modeScheduleEl) modeScheduleEl.checked = adminSystemLock.mode === "schedule";
            if (enabledEl) enabledEl.checked = adminSystemLock.enabled;
            if (dateEl) {
                dateEl.value = adminSystemLock.untilDate || "";
            }
            if (startEl) startEl.value = adminSystemLock.startAt || "";
            if (endEl) endEl.value = adminSystemLock.endAt || "";
            toggleAdminDateInput();
            if (badge) {
                badge.className = `badge ${isGuruLockedByAdmin() ? "badge-danger" : "badge-success"}`;
                badge.innerText = getAdminLockStatusMessage();
            }
        }

        function toggleAdminDateInput() {
            let modeSchedule = !!document.querySelector('input[name="adminLockMode"][value="schedule"]')?.checked;
            let enabledEl = document.getElementById("adminLockEnabled");
            let dateEl = document.getElementById("adminLockUntil");
            let startEl = document.getElementById("adminLockStartAt");
            let endEl = document.getElementById("adminLockEndAt");

            if (enabledEl) {
                enabledEl.disabled = modeSchedule;
                enabledEl.style.opacity = modeSchedule ? "0.6" : "1";
            }
            if (dateEl) {
                let allowManualDate = !modeSchedule && !!enabledEl?.checked;
                dateEl.disabled = !allowManualDate;
                dateEl.style.opacity = allowManualDate ? "1" : "0.6";
            }
            if (startEl) {
                startEl.disabled = !modeSchedule;
                startEl.style.opacity = modeSchedule ? "1" : "0.6";
            }
            if (endEl) {
                endEl.disabled = !modeSchedule;
                endEl.style.opacity = modeSchedule ? "1" : "0.6";
            }
        }

        function saveAdminSettingsFromUI() {
            let modeSchedule = !!document.querySelector('input[name="adminLockMode"][value="schedule"]')?.checked;
            let enabledEl = document.getElementById("adminLockEnabled");
            let dateEl = document.getElementById("adminLockUntil");
            let startEl = document.getElementById("adminLockStartAt");
            let endEl = document.getElementById("adminLockEndAt");
            if (!enabledEl || !dateEl || !startEl || !endEl) return;

            let manualEnabled = !!enabledEl.checked;
            let manualUntilDate = manualEnabled ? (dateEl.value || "") : "";
            let scheduleStart = startEl.value || "";
            let scheduleEnd = endEl.value || "";

            adminSystemLock.mode = modeSchedule ? "schedule" : "manual";
            adminSystemLock.enabled = manualEnabled;
            adminSystemLock.untilDate = manualUntilDate;
            adminSystemLock.startAt = scheduleStart;
            adminSystemLock.endAt = scheduleEnd;

            if (modeSchedule && (!adminSystemLock.startAt || !adminSystemLock.endAt)) {
                alert("❌ Sila tetapkan Tarikh/Masa Mula Buka dan Tarikh/Masa Tamat Buka untuk mod Jadual.");
                return;
            }
            if (modeSchedule) {
                let start = new Date(adminSystemLock.startAt);
                let end = new Date(adminSystemLock.endAt);
                if (Number.isNaN(start.getTime()) || Number.isNaN(end.getTime()) || end < start) {
                    alert("❌ Jadual tidak sah. Tarikh/Masa Tamat Buka mesti selepas Tarikh/Masa Mula Buka.");
                    return;
                }
            }

            saveAll();
            applyAdminSettingsUI();
            setSystemControlsLocked();
            renderCurrentPage();
            maybeNotifyGuruAdminExpiry();
            alert("✅ Tetapan admin berjaya dikemaskini.");
        }

        function getStudentItemData(student, exam) {
            let cfg = getItemConfig();
            if (!student.itemData || typeof student.itemData !== "object") student.itemData = {};
            if (!student.itemData[exam] || typeof student.itemData[exam] !== "object") student.itemData[exam] = {};

            let examData = student.itemData[exam];
            let nextExamData = {};

            cfg.kertas.forEach(kertas => {
                let existingItems = Array.isArray(examData[kertas.nama]) ? examData[kertas.nama] : [];
                let normalizedItems = kertas.soalan.map((soal, si) => {
                    let oldItem = existingItems[si] || {};
                    let oldMark = toNumber(oldItem.mark, 0);
                    let mark = Number.isFinite(oldMark) ? oldMark : 0;
                    mark = Math.max(0, mark);
                    return { mark: mark, fullMark: soal.markahPenuh };
                });
                nextExamData[kertas.nama] = normalizedItems;
            });

            student.itemData[exam] = nextExamData;
            return student.itemData[exam];
        }

                        }

                    }

        function renderTrend(){

    let completedExamsList = getCompletedExams();
    let u = new Array(completedExamsList.length).fill(0);
    s.forEach(x=>{
        for(let i=0; i<completedExamsList.length; i++) {
            let exam = completedExamsList[i];
            let examIndex = examNames.indexOf(exam);
            u[i] += x.marks[examIndex] || 0;
        }
    });
    u = u.map(v=> (v/s.length).toFixed(1));
    if(trendChart) trendChart.destroy();
    trendChart = new Chart(document.getElementById("trendChart").getContext('2d'),{
        type:'line',
        data:{labels:completedExamsList, datasets:[{data:u, borderColor:'#6366f1', backgroundColor:'rgba(99,102,241,0.08)', fill:true, borderWidth:3, tension:0.4}]},
        options:{responsive:true, plugins:{legend:{display:false}}, scales:{y:{max:100}}}
    });
    let diff = u[u.length-1] - u[0];
    let examTerakhir = completedExamsList[completedExamsList.length-1];
    document.getElementById("trendDescription").innerHTML = `Purata <strong>${u[u.length-1]}%</strong> ${examTerakhir}. ${diff>=0?'📈 Meningkat':'📉 Menurun'} <strong>${Math.abs(diff).toFixed(1)}%</strong> dari ${completedExamsList[0]}.`;
}

        function hitungCepat(){
            let x=getActiveStudents()[currentBMEditStudent];
            if(!x)return;
            let cfg=getItemConfig();
            let examData=getStudentItemData(x,currentBMEditExam);
            let allMarkah=0,allFull=0;

            cfg.kertas.forEach((kertas,ki)=>{
                let items=examData[kertas.nama]||[];
                let kMark=0;
                kertas.soalan.forEach((soal,si)=>{
                    if(!items[si]||typeof items[si]!=="object") items[si]={mark:0,fullMark:soal.markahPenuh};
                    let val=toNumber(document.getElementById("im_"+ki+"_"+si)?.value, NaN);
                    if(Number.isNaN(val)) val=toNumber(items[si].mark,0);
                    items[si].fullMark=soal.markahPenuh;
                    items[si].mark=Math.max(0,val);
                    kMark+=items[si].mark;
                });
                allMarkah+=kMark;
                allFull+=kertas.soalan.reduce((a,b)=>a+b.markahPenuh,0);
            });
            let el=document.getElementById("overallPct");
            if(el)el.innerText=allFull>0?Math.round(allMarkah/allFull*100)+"% ("+allMarkah+"/"+allFull+")":"0%";

                function simpanMarkahBM(){
            let x=getActiveStudents()[currentBMEditStudent];
            let examNames = getCurrentExamNames();
            if(!x)return;
            let examIdx = examNames.indexOf(currentBMEditExam);
            if(examIdx < 0){ alert("Ralat: peperiksaan tidak ditemui."); return; }
            let cfg=getItemConfig();
            let examData=getStudentItemData(x,currentBMEditExam);
            let allMarkah=0,allFull=0;

            cfg.kertas.forEach((kertas,ki)=>{
                let items=examData[kertas.nama]||[];
                let kFull=kertas.soalan.reduce((a,b)=>a+b.markahPenuh,0);
                let target=toNumber(document.getElementById("bmComp_"+ki)?.value,NaN);
                if(Number.isNaN(target)) target=items.reduce((a,b)=>a+toNumber(b.mark,0),0);
                target=Math.max(0,Math.min(target,kFull));
                let baki=target;

                kertas.soalan.forEach((soal,si)=>{
                    if(!items[si]||typeof items[si]!=="object") items[si]={mark:0,fullMark:soal.markahPenuh};
                    items[si].fullMark=soal.markahPenuh;
                    let isi=Math.min(baki,soal.markahPenuh);
                    items[si].mark=Math.max(0,isi);
                    baki-=isi;
                });

                examData[kertas.nama]=items.slice(0,kertas.soalan.length);
                allMarkah+=target;
                allFull+=kFull;
            });

            x.marks[examIdx] = allFull>0 ? Math.round(allMarkah/allFull*100) : 0;
            x.ulasan=document.getElementById("editUlasan")?.value||'';
            saveAll();
            tutupModal("modalEditMarkah");
            currentBMEditStudent=null;currentBMEditExam=null;
            renderCurrentPage();
        }

        function simpanAnalisisItem(){
            // Simpan referens supaya tidak hilang semasa operasi
            let savedStudent = currentBMEditStudent;
            let savedExam = currentBMEditExam;
            let x=getActiveStudents()[savedStudent];
            if(!x)return;
            let examNames = getCurrentExamNames();
            let examIdx = examNames.indexOf(savedExam);
            if(examIdx<0){alert("Ralat: peperiksaan tidak ditemui.");return;}
            let cfg=getItemConfig();
            let examData=getStudentItemData(x,savedExam);
            let allMarkah=0,allFull=0;

            cfg.kertas.forEach((kertas,ki)=>{
                let items=examData[kertas.nama]||[];
                let kMark=0;
                kertas.soalan.forEach((soal,si)=>{
                    if(!items[si]||typeof items[si]!=="object") items[si]={mark:0,fullMark:soal.markahPenuh};
                    let val=toNumber(document.getElementById("im_"+ki+"_"+si)?.value,NaN);
                    if(Number.isNaN(val)) val=toNumber(items[si].mark,0);
                    items[si].fullMark=soal.markahPenuh;
                    items[si].mark=Math.max(0,val);
                    kMark+=items[si].mark;
                });
                examData[kertas.nama]=items.slice(0,kertas.soalan.length);
                allMarkah+=kMark;
                allFull+=kertas.soalan.reduce((a,b)=>a+b.markahPenuh,0);
            });

            x.marks[examIdx]=allFull>0?Math.round(allMarkah/allFull*100):0;
            x.ulasan=document.getElementById("editUlasan")?.value||'';

            tutupModal("modalEditMarkah");

        function renderToken(){
    let c=document.getElementById("tokenContent"), s=document.getElementById("selectSubject").value, cls=document.getElementById("selectClass").value;
    if(!s||!cls||getActiveStudents().length===0){c.innerHTML='<div class="card" style="text-align:center;padding:40px;">Pilih Subjek dan Kelas.</div>';return;}
    
    let students = getActiveStudents();
    
    // Kira skor token untuk setiap pelajar (Positif +1, Negatif -1)
    let leaderboard = [];
    students.forEach(student => {
        let positif = student.token?.filter(t=>t.type==="positif").length || 0;
        let negatif = student.token?.filter(t=>t.type==="negatif").length || 0;
        let skor = positif - negatif;
        leaderboard.push({
            name: student.name,
            positif: positif,
            negatif: negatif,
            skor: skor,
            token: student.token || []
        });
    });
    
    // Susun mengikut skor tertinggi
    leaderboard.sort((a,b) => b.skor - a.skor);
    
    // Beri kedudukan
    leaderboard.forEach((item, idx) => {
        item.rank = idx + 1;
        if(idx > 0 && item.skor === leaderboard[idx-1].skor) item.rank = leaderboard[idx-1].rank;
    });
    
    // Kira statistik
    let totalPositif = leaderboard.reduce((sum,item) => sum + item.positif, 0);
    let totalNegatif = leaderboard.reduce((sum,item) => sum + item.negatif, 0);
    let peserta = leaderboard.length;
    let juara = leaderboard[0] || null;
    
    c.innerHTML = `
    <div class="dashboard-premium">
        <!-- HERO TOKEN -->
        <div class="dash-hero" style="background: linear-gradient(135deg, #f59e0b 0%, #d97706 100%);">
            <div class="dash-hero-left">
                <div class="dash-hero-icon" style="background:rgba(255,255,255,0.2);"><i class="fas fa-trophy"></i></div>
                <div>
                    <h2>🏆 Pertandingan Token ⭐</h2>
                    <p>${s} · ${cls} · ${getCurrentTingkatan()}</p>
                </div>
            </div>
            <div class="dash-hero-right">
                <div class="dash-hero-stat">
                    <span class="dash-hero-stat-value" style="color:#fcd34d;">${totalPositif}</span>
                    <span class="dash-hero-stat-label">🌟 Positif</span>
                </div>
                <div class="dash-hero-stat">
                    <span class="dash-hero-stat-value" style="color:#fca5a5;">${totalNegatif}</span>
                    <span class="dash-hero-stat-label">⚠️ Negatif</span>
                </div>
                <div class="dash-hero-stat">
                    <span class="dash-hero-stat-value" style="color:#a5f3fc;">${peserta}</span>
                    <span class="dash-hero-stat-label">👥 Peserta</span>
                </div>
            </div>
        </div>
        
        <!-- JUARA CARD -->
        ${juara ? `
        <div class="dash-chart-card" style="text-align:center;background:linear-gradient(135deg,#fef3c7,#fffbeb);border-color:#fcd34d;">
            <div style="font-size:3rem;">🏆</div>
            <div style="font-size:1.5rem;font-weight:800;color:#92400e;">JUARA KELAS</div>
            <div style="font-size:1.8rem;font-weight:800;color:#d97706;margin:8px 0;">${juara.name}</div>
            <div style="display:flex;justify-content:center;gap:20px;margin-top:10px;">
                <div><span style="font-size:1.5rem;font-weight:800;color:#10b981;">${juara.positif}</span><br><span style="font-size:0.7rem;">🌟 Positif</span></div>
                <div><span style="font-size:1.5rem;font-weight:800;color:#ef4444;">${juara.negatif}</span><br><span style="font-size:0.7rem;">⚠️ Negatif</span></div>
                <div><span style="font-size:1.8rem;font-weight:800;color:#f59e0b;">${juara.skor}</span><br><span style="font-size:0.7rem;">⭐ Skor</span></div>
            </div>
        </div>
        ` : ''}
        
        <!-- LEADERBOARD TABLE -->
        <div class="dash-intervention-card">
            <div class="dash-chart-header">
                <h3><i class="fas fa-ranking-star" style="color:#f59e0b;"></i> Papan Pendahulu (Leaderboard)</h3>
                <button class="btn btn-primary" onclick="bukaModalToken()" style="background:#f59e0b;"><i class="fas fa-plus"></i> Tambah Token</button>
            </div>
            <div style="overflow-x:auto;">
                <table>
                    <thead>
                        <tr><th>#</th><th>Nama Pelajar</th><th>🌟 Positif</th><th>⚠️ Negatif</th><th>⭐ Skor</th><th>Pingat</th><th></th></tr>
                    </thead>
                    <tbody>
                        ${leaderboard.map((item, idx) => {
                            let medal = '';
                            let medalColor = '';
                            if(item.rank === 1) { medal = '🥇'; medalColor = '#fcd34d'; }
                            else if(item.rank === 2) { medal = '🥈'; medalColor = '#cbd5e1'; }
                            else if(item.rank === 3) { medal = '🥉'; medalColor = '#fdba74'; }
                            else { medal = `${item.rank}`; medalColor = '#94a3b8'; }
                            
                            let skorClass = item.skor >= 5 ? 'badge-success' : (item.skor >= 0 ? 'badge-info' : 'badge-danger');
                            
                            return `
                            <tr style="${idx === 0 ? 'background:#fef3c7;' : ''}">
                                <td style="font-weight:800;font-size:1.2rem;color:${medalColor};">${medal}</td>
                                <td style="font-weight:600;color:#6366f1;">${item.name}</td>
                                <td style="color:#10b981;font-weight:700;">${item.positif}</td>
                                <td style="color:#ef4444;font-weight:700;">${item.negatif}</td>
                                <td><span class="badge ${skorClass}" style="font-size:0.9rem;">${item.skor}</span></td>
                                <td>${item.skor >= 10 ? '🏅 Pelajar Cemerlang' : (item.skor >= 5 ? '⭐ Bintang Muda' : (item.skor >= 0 ? '🌱 Usaha Tangga' : '⚠️ Perlu Perhatian'))}</td>

                            </tr>`;
                        }).join('')}
                    </tbody>
                </table>
            </div>
        </div>
    </div>`;
}

// Fungsi untuk lihat rekod token individu
function lihatRekodToken(name){
    let student = getActiveStudents().find(s => s.name === name);
    if(!student) return;
    
    let positif = student.token?.filter(t=>t.type==="positif") || [];
    let negatif = student.token?.filter(t=>t.type==="negatif") || [];
    
    let html = `<h3 class="card-header">📜 Rekod Token · ${name}</h3>
    <div style="margin-bottom:16px;">
        <div style="display:flex;gap:16px;justify-content:center;margin-bottom:16px;">
            <div style="text-align:center;padding:12px;background:#d1fae5;border-radius:16px;flex:1;">
                <div style="font-size:2rem;">🌟</div>
                <div style="font-size:1.5rem;font-weight:800;">${positif.length}</div>
                <div>Positif</div>
            </div>
            <div style="text-align:center;padding:12px;background:#fee2e2;border-radius:16px;flex:1;">
                <div style="font-size:2rem;">⚠️</div>
                <div style="font-size:1.5rem;font-weight:800;">${negatif.length}</div>
                <div>Negatif</div>
            </div>
            <div style="text-align:center;padding:12px;background:#fef3c7;border-radius:16px;flex:1;">
                <div style="font-size:2rem;">⭐</div>
                <div style="font-size:1.5rem;font-weight:800;">${positif.length - negatif.length}</div>
                <div>Skor</div>
            </div>
        </div>
        
        <div style="max-height:300px;overflow-y:auto;">
            <div style="font-weight:700;margin-bottom:8px;">🌟 Rekod Positif:</div>
            ${positif.length > 0 ? positif.map(t => `<div style="padding:6px;background:#f0fdf4;border-radius:8px;margin-bottom:4px;">📅 ${new Date().toLocaleDateString()} - ${t.desc || 'Tiada keterangan'}</div>`).join('') : '<div style="color:#94a3b8;padding:6px;">Tiada rekod positif</div>'}
            
            <div style="font-weight:700;margin:12px 0 8px;">⚠️ Rekod Negatif:</div>
            ${negatif.length > 0 ? negatif.map(t => `<div style="padding:6px;background:#fef2f2;border-radius:8px;margin-bottom:4px;">📅 ${new Date().toLocaleDateString()} - ${t.desc || 'Tiada keterangan'}</div>`).join('') : '<div style="color:#94a3b8;padding:6px;">Tiada rekod negatif</div>'}
        </div>
    </div>
    <div class="flex justify-end gap-3">
        <button class="btn btn-primary" onclick="bukaModalTokenUntuk('${name}')">➕ Tambah Token</button>
        <button class="btn btn-ghost" onclick="tutupModal('modalTokenRekod')">Tutup</button>
    </div>`;
    
    // Cipta modal baru jika belum ada
    let modal = document.getElementById("modalTokenRekod");
    if(!modal){
        let newModal = document.createElement('div');
        newModal.id = "modalTokenRekod";
        newModal.className = "modal";
        newModal.innerHTML = `<div class="modal-content" style="width:450px;" id="modalTokenRekodContent"></div>`;
        document.body.appendChild(newModal);
        modal = newModal;
    }
    document.getElementById("modalTokenRekodContent").innerHTML = html;
    modal.style.display = "flex";
}

// Helper function untuk escape HTML
function escapeHtml(str) {
    if(!str) return '';
    return str
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
}

        function getPBD(subj,kelas,skill,sp,name){
    let data = pbdData[subj]?.[kelas]?.[skill]?.[sp]?.[name];
    if(data && data.tp > 0){
        return data;
    }
    // TP = 0 bermaksud belum dinilai
    return {tp:0, remark:"", tarikh:"-"};
}
                function setPBD(subj,kelas,skill,sp,name,tp,remark){
    if(!pbdData[subj]) pbdData[subj]={};
    if(!pbdData[subj][kelas]) pbdData[subj][kelas]={};
    if(!pbdData[subj][kelas][skill]) pbdData[subj][kelas][skill]={};
    if(!pbdData[subj][kelas][skill][sp]) pbdData[subj][kelas][skill][sp]={};
    
    let existing = pbdData[subj][kelas][skill][sp][name];
    let tarikh = (existing && existing.tarikh && existing.tarikh !== "-") 
        ? existing.tarikh 
        : new Date().toLocaleDateString('ms-MY',{day:'2-digit',month:'2-digit',year:'numeric'});
    
    if(existing && existing.tp !== tp && tp > 0){
        tarikh = new Date().toLocaleDateString('ms-MY',{day:'2-digit',month:'2-digit',year:'numeric'});
    }
    
    if(tp === 0){
        pbdData[subj][kelas][skill][sp][name] = {tp:0, remark:"", tarikh:"-"};
    } else {
        pbdData[subj][kelas][skill][sp][name] = {tp:tp, remark:remark, tarikh:tarikh};
    }
    saveAll();
}

                html += '<td style="padding:6px 4px; text-align:center; border:1px solid #e2e8f0; font-weight:500; color:' + colorClass + ';">' + markah + '</td>';
                markahIdx++;
            }
            let kertasMarkah = p.kertasMarkah[ki];
            let kertasPenuh = k.soalan.reduce((sum, s) => sum + s.markahPenuh, 0);
            let percentKertas = kertasPenuh > 0 ? Math.round((kertasMarkah / kertasPenuh) * 100) : 0;
            let warnaJumlah = percentKertas >= 80 ? '#059669' : (percentKertas >= 50 ? '#d97706' : '#dc2626');
            html += '<td style="padding:6px 4px; text-align:center; border:1px solid #e2e8f0; background:#eff6ff; font-weight:600; color:' + warnaJumlah + ';">' + kertasMarkah + '<span style="font-size:0.6rem; color:#94a3b8;">/' + kertasPenuh + '</span></td>';
        }
        let purataWarna = p.overallPercent >= 80 ? '#059669' : (p.overallPercent >= 50 ? '#d97706' : '#dc2626');
        html += '<td style="padding:6px 4px; text-align:center; border:1px solid #e2e8f0; font-weight:700; color:' + purataWarna + ';">' + p.overallPercent + '%</td>';
        let badgeBg = p.gredInfo.warna + '15';
        html += '<td style="padding:6px 4px; text-align:center; border:1px solid #e2e8f0;"><span style="display:inline-block; padding:2px 8px; border-radius:12px; background:' + badgeBg + '; color:' + p.gredInfo.warna + '; font-weight:600; font-size:0.65rem;">' + (isSPMLevel ? p.gredInfo.gred : '-') + '</span></td>';
        html += '</tr>';
    }
    html += '</tbody></table>';
    
    // Tambah CSS untuk highlight
    html += '<style>';
    html += '.row-highlight { background: #fef3c7 !important; border-left: 4px solid #f59e0b !important; }';
    html += '.row-lemah { background: #fee2e2 !important; border-left: 4px solid #dc2626 !important; }';
    html += '.row-lemah td { background: #fee2e2 !important; }';
    html += '.row-highlight td { background: #fef3c7 !important; }';
    html += '</style>';
    
    document.getElementById("printAnalysisReport").innerHTML = html;
    
    // Auto highlight pelajar lemah (purata <50%)
    setTimeout(function() {
        highlightPelajarLemah(tableId);
        // Set checkbox untuk pelajar lemah sebagai checked
        let checkboxes = document.querySelectorAll('.student-checkbox[data-table="' + tableId + '"]');
        checkboxes.forEach(function(cb) {
            let studentIdx = parseInt(cb.getAttribute('data-student'));
            if(pelajarData[studentIdx] && pelajarData[studentIdx].isLemah) {
                cb.checked = true;
            }
        });
    }, 100);
}

// ==================== FUNGSI UNTUK HIGHLIGHT ====================
function highlightPelajarLemah(tableId) {
    let table = document.getElementById(tableId);
    if(!table) return;
    let rows = table.querySelectorAll('tbody tr');
    rows.forEach(function(row, idx) {
        let isLemah = row.getAttribute('data-lemah') === 'true';
        if(isLemah) {
            row.classList.add('row-highlight');
            row.style.background = '#fef3c7';
        }
        // Update checkbox
        let checkbox = document.querySelector('.student-checkbox[data-table="' + tableId + '"][data-student="' + idx + '"]');
        if(checkbox && isLemah) {
            checkbox.checked = true;
        }
    });
}

function resetHighlight(tableId) {
    let table = document.getElementById(tableId);
    if(!table) return;
    let rows = table.querySelectorAll('tbody tr');
    rows.forEach(function(row, idx) {
        row.classList.remove('row-highlight');
        let isLemah = row.getAttribute('data-lemah') === 'true';
        if(isLemah) {
            row.style.background = '#fee2e2';
        } else {
            row.style.background = (idx % 2 === 0) ? '#ffffff' : '#f8fafc';
        }
        // Uncheck checkbox
        let checkbox = document.querySelector('.student-checkbox[data-table="' + tableId + '"][data-student="' + idx + '"]');
        if(checkbox) {
            checkbox.checked = false;
        }
    });
}

function toggleHighlightPelajar(checkbox, tableId) {
    let studentIdx = parseInt(checkbox.getAttribute('data-student'));
    let row = document.getElementById('row_' + tableId + '_' + studentIdx);
    if(!row) return;
    
    if(checkbox.checked) {
        row.classList.add('row-highlight');
        row.style.background = '#fef3c7';
    } else {
        row.classList.remove('row-highlight');
        let isLemah = row.getAttribute('data-lemah') === 'true';
        if(isLemah) {
            row.style.background = '#fee2e2';
        } else {
            row.style.background = (studentIdx % 2 === 0) ? '#ffffff' : '#f8fafc';
        }
    }
}

function pilihSemuaPelajar(tableId, pilih) {
    let checkboxes = document.querySelectorAll('.student-checkbox[data-table="' + tableId + '"]');
    checkboxes.forEach(function(cb) {
        cb.checked = pilih;
        let studentIdx = parseInt(cb.getAttribute('data-student'));
        let row = document.getElementById('row_' + tableId + '_' + studentIdx);
        if(row) {
            if(pilih) {
                row.classList.add('row-highlight');
                row.style.background = '#fef3c7';
            } else {
                row.classList.remove('row-highlight');
                let isLemah = row.getAttribute('data-lemah') === 'true';
                if(isLemah) {
                    row.style.background = '#fee2e2';
                } else {
                    row.style.background = (studentIdx % 2 === 0) ? '#ffffff' : '#f8fafc';
                }
            }
        }
    });
}
// ==================== RANKING ANALISIS SOALAN (Butang Berasingan) ====================
function bukaRankingAnalisisSoalan() {
    let subjek = document.getElementById("selectSubject").value;
    let kelas = document.getElementById("selectClass").value;
    let pelajar = getActiveStudents();
    
    if(!subjek || !kelas || pelajar.length === 0) {
        alert("❌ Sila pilih Subjek dan Kelas terlebih dahulu.");
        return;
    }
    
    let examNames = getCurrentExamNames();
    let examPilihan = prompt("📋 Pilih peperiksaan untuk dianalisis:\n\n" + examNames.join("\n"), examNames[0]);
    if(!examPilihan) return;
    
    if(!examNames.includes(examPilihan)) {
        alert("❌ Nama peperiksaan tidak sah!");
        return;
    }
    
    renderRankingAnalisisSoalan(examPilihan);
    let modal = document.getElementById("modalRankingSoalan");
    if(modal) {
        modal.style.display = "flex";
    } else {
        alert("❌ Ralat: Modal tidak dijumpai. Sila refresh halaman.");
    }
}

function renderRankingAnalisisSoalan(examPilihan) {
    let subjek = document.getElementById("selectSubject").value;
    let pelajar = getActiveStudents();
    let cfg = getItemConfig();
    let kelas = document.getElementById("selectClass").value;
    let ting = getCurrentTingkatan();
    
    if(!cfg || !cfg.kertas || cfg.kertas.length === 0) {
        document.getElementById("modalRankingSoalanContent").innerHTML = '<div style="padding:20px; text-align:center; color:red;">❌ Tiada konfigurasi item. Sila setup di halaman Prestasi > Konfigurasi Item.</div>';
        return;
    }
    
    // Kumpul data markah pelajar untuk setiap soalan
    let semuaMarkahPelajar = [];
    let soalanAnalisis = [];
    
    for(let i = 0; i < pelajar.length; i++) {
        let p = pelajar[i];
        let semuaMarkah = [];
        
        for(let ki = 0; ki < cfg.kertas.length; ki++) {
            let k = cfg.kertas[ki];
            let itemData = getStudentItemData(p, examPilihan);
            let kertasData = itemData[k.nama] || [];
            
            for(let si = 0; si < k.soalan.length; si++) {
                let item = kertasData[si] || {mark: 0};
                let markah = item.mark || 0;
                semuaMarkah.push(markah);
            }
        }
        semuaMarkahPelajar.push(semuaMarkah);
    }
    
    let soalanIdx = 0;
    for(let ki = 0; ki < cfg.kertas.length; ki++) {
        let k = cfg.kertas[ki];
        for(let si = 0; si < k.soalan.length; si++) {
            let s = k.soalan[si];
            let dapatPenuh = 0;
            let dapatSeparuh = 0;
            let dapatKurang = 0;
            let jumlahMarkah = 0;
            let maksimumMarkah = s.markahPenuh * pelajar.length;
            
            for(let i = 0; i < pelajar.length; i++) {
                let markah = semuaMarkahPelajar[i][soalanIdx] || 0;
                let peratus = (markah / s.markahPenuh) * 100;
                jumlahMarkah += markah;
                
                if(markah >= s.markahPenuh) {
                    dapatPenuh++;
                } else if(peratus >= 50) {
                    dapatSeparuh++;
                } else {
                    dapatKurang++;
                }
            }
            
            let peratusKeseluruhan = maksimumMarkah > 0 ? Math.round((jumlahMarkah / maksimumMarkah) * 100) : 0;
            
            soalanAnalisis.push({
                kertas: k.nama,
                noSoalan: s.no,
                markahPenuh: s.markahPenuh,
                dapatPenuh: dapatPenuh,
                dapatSeparuh: dapatSeparuh,
                dapatKurang: dapatKurang,
                peratusKeseluruhan: peratusKeseluruhan,
                jumlahMarkah: jumlahMarkah,
                maksimumMarkah: maksimumMarkah
            });
            soalanIdx++;
        }
    }
    
    // Ranking dari tertinggi ke terendah
    soalanAnalisis.sort((a, b) => b.peratusKeseluruhan - a.peratusKeseluruhan);
    
    // Kumpulan mengikut tahap
    let tahapKuat = soalanAnalisis.filter(s => s.peratusKeseluruhan >= 80);
    let tahapSederhana = soalanAnalisis.filter(s => s.peratusKeseluruhan >= 60 && s.peratusKeseluruhan < 80);

                <th style="padding:10px 6px; border:1px solid #4c1d95; color:white; text-align:center; width:50px;">Rank</th>

function toggleRegisterMode(mode) {

    let singleTab = document.getElementById('registerSingleTab');
    let bulkTab = document.getElementById('registerBulkTab');
    let singleMode = document.getElementById('registerSingleMode');
    let bulkMode = document.getElementById('registerBulkMode');

function clearBulkTextarea() {
    document.getElementById('bulkNamesTextarea').value = '';
    document.getElementById('bulkPreviewResult').innerHTML = '';

function daftarPelajarPukal() {
    let subjek = document.getElementById('bulkSubjectSelect').value;
    let kelas = document.getElementById('bulkClassSelect').value;
    let namesText = document.getElementById('bulkNamesTextarea').value;
    if(!subjek || !kelas) { alert('❌ Sila pilih Subjek dan Kelas terlebih dahulu!'); return; }
    if(!namesText.trim()) { alert('❌ Sila masukkan senarai nama pelajar!'); return; }
    let names = namesText.split(/\r?\n/).map(n => n.trim()).filter(n => n.length > 0);
    if(names.length === 0) { alert('❌ Tiada nama yang sah!'); return; }
    let key = subjek + "_" + kelas;
    if(!allData[key]) allData[key] = { students: [] };
    let existingNames = allData[key].students.map(s => s.name);
    let newStudents = [], duplicates = [];
    let examNamesLocal = getCurrentExamNames();
    for(let name of names) {
        if(existingNames.includes(name)) { duplicates.push(name); continue; }
        let newStudent = { name: name, ic: "-", marks: new Array(examNamesLocal.length).fill(0), ulasan: "-", buku: {}, token: [], itemData: {} };
        masterWeeks.forEach(w => { newStudent.buku[w] = "kosong"; });
        allData[key].students.push(newStudent);
        newStudents.push(name);
    }
    saveAll();
    let previewHtml = '';
    if(newStudents.length > 0) previewHtml += '<div style="background:#d1fae5; border-radius:10px; padding:10px; margin-top:10px;"><strong>✅ Berjaya daftar: ' + newStudents.length + ' pelajar</strong><br><span style="font-size:0.65rem;">' + newStudents.join(', ') + '</span></div>';
    if(duplicates.length > 0) previewHtml += '<div style="background:#fee2e2; border-radius:10px; padding:10px; margin-top:8px;"><strong>⚠️ Sudah wujud: ' + duplicates.length + ' pelajar</strong><br><span style="font-size:0.65rem;">' + duplicates.join(', ') + '</span></div>';
    document.getElementById('bulkPreviewResult').innerHTML = previewHtml;
    refreshSelectors(); refreshSettingsSelects();
    document.getElementById("selectSubject").value = subjek;
    document.getElementById("selectClass").value = kelas;
    if(newStudents.length > 0) alert('✅ ' + newStudents.length + ' pelajar berjaya didaftarkan!');
    else alert('⚠️ Tiada pelajar baru didaftar. ' + duplicates.length + ' nama sudah wujud.');
    renderCurrentPage();
}

function setupBulkPreview() {
    let textarea = document.getElementById('bulkNamesTextarea');
    if(textarea) {
        textarea.addEventListener('input', function() {
            let lines = this.value.split(/\r?\n/).filter(l => l.trim().length > 0);
            let previewDiv = document.getElementById('bulkPreviewResult');

        });
    }
}

// ========== SALIN SENARAI PELAJAR DARI SUBJEK LAIN ==========
function salinSenaraiPelajar() {
    let kelas = document.getElementById("copyClassSelect").value;
    let subjekSumber = document.getElementById("copySourceSubject").value;
    let subjekDestinasi = document.getElementById("copyTargetSubject").value;
    
    if(!kelas || !subjekSumber || !subjekDestinasi) {
        alert("❌ Sila pilih Kelas, Subjek SUMBER dan Subjek DESTINASI.");
        return;
    }
    
    if(subjekSumber === subjekDestinasi) {
        alert("❌ Subjek sumber dan destinasi mestilah berbeza.");
        return;
    }
    
    let keySumber = subjekSumber + "_" + kelas;
    let keyDestinasi = subjekDestinasi + "_" + kelas;
    
    if(!allData[keySumber] || !allData[keySumber].students || allData[keySumber].students.length === 0) {
        alert(`❌ Subjek ${subjekSumber} (${kelas}) tiada data pelajar.`);
        return;
    }
    
    let sourceStudents = allData[keySumber].students;
    let existingStudents = allData[keyDestinasi]?.students || [];
    
    let isOverwrite = confirm(`⚠️ SUMBER: ${subjekSumber} (${sourceStudents.length} pelajar)\nDESTINASI: ${subjekDestinasi} (${existingStudents.length} pelajar)\n\n[OK] = GANTI semua\n[Batal] = TAMBAH sahaja`);
    
    let newStudents = [];
    
    for(let student of sourceStudents) {
        let existing = existingStudents.find(s => s.name === student.name);
        
        if(existing && !isOverwrite) {
            let update = confirm(`Pelajar "${student.name}" sudah wujud. Kemaskini?`);
            if(update) {
                newStudents.push({
                    ...existing,
                    name: student.name,
                    ic: student.ic || existing.ic,
                    marks: existing.marks,
                    ulasan: existing.ulasan,
                    buku: existing.buku || {},
                    token: existing.token || [],
                    itemData: existing.itemData || {}
                });
            } else {
                newStudents.push(existing);
            }
        } else if(existing && isOverwrite) {
            newStudents.push({
                name: student.name,
                ic: student.ic || "-",
                marks: [0,0,0,0],
                ulasan: "-",
                buku: {},
                token: [],
                itemData: {}
            });
        } else {
            newStudents.push({
                name: student.name,
                ic: student.ic || "-",
                marks: [0,0,0,0],
                ulasan: "-",
                buku: {},
                token: [],
                itemData: {}
            });
        }
    }
    
    if(!isOverwrite) {
        for(let existing of existingStudents) {
            if(!newStudents.find(s => s.name === existing.name)) {
                newStudents.push(existing);
            }
        }
    }
    
    if(!allData[keyDestinasi]) allData[keyDestinasi] = { students: [] };
    allData[keyDestinasi].students = newStudents;
    saveAll();
    
    alert(`✅ BERJAYA! ${newStudents.length} pelajar disalin ke ${subjekDestinasi} (${kelas})`);
    
    refreshSelectors();
    document.getElementById("selectSubject").value = subjekDestinasi;
    document.getElementById("selectClass").value = kelas;
    renderCurrentPage();
    refreshSettingsSelects();
}

                       function uploadDSKP(){
            let subj = document.getElementById("dskpSubjectSelect").value;
            let fileInput = document.getElementById("dskpFileInput");
            let file = fileInput.files[0];

            if(!subj){ alert("❌ Sila pilih Subjek terlebih dahulu."); return; }
            if(!file){ alert("❌ Sila pilih fail JSON DSKP."); return; }

            let reader = new FileReader();
            reader.onload = function(e){
                try {
                    let json = JSON.parse(e.target.result);
                    let allSkills = {};
                    
                    if(json.skills && Array.isArray(json.skills)){
                        allSkills["Tingkatan 5"] = json.skills;
                    }
                    else if(json.levels){
                        Object.keys(json.levels).forEach(tingKey => {
                            let levelData = json.levels[tingKey];
                            if(levelData.kemahiran){
                                let match = tingKey.match(/tingkatan[_\s]*(\d+)/i);
                                let tingNum = match ? parseInt(match[1]) : 5;
                                let tingFormatted = "Tingkatan " + tingNum;
                                
                                let skills = [];
                                Object.keys(levelData.kemahiran).forEach(key => {
                                    let kem = levelData.kemahiran[key];
                                    if(kem.spList && Array.isArray(kem.spList)){
                                        skills.push({ code: kem.code || key, name: kem.name || key, spList: kem.spList });
                                    }
                                });
                                if(skills.length > 0) allSkills[tingFormatted] = skills;
                            }
                        });
                    }
                    else { throw new Error("Format JSON tidak dikenali."); }
                    
                    if(Object.keys(allSkills).length === 0) throw new Error("Tiada kemahiran ditemui.");
                    
                    if(!dskpDatabase[subj]) dskpDatabase[subj] = {};
                    let savedTing = [];
                    Object.keys(allSkills).forEach(ting => {
                        dskpDatabase[subj][ting] = { skills: allSkills[ting] };
                        savedTing.push(ting + " (" + allSkills[ting].length + " kemahiran)");
                    });
                    saveAll();
                    alert(`✅ DSKP untuk ${subj} berjaya dimuat naik!\n\nTingkatan dikesan: ${savedTing.join(', ')}`);
                    fileInput.value = "";
                    refreshSettingsSelects();
                    if(document.querySelector(".page.active-page")?.id === "pbdPage") renderPBD();
                } catch(err){ alert("❌ Ralat: " + err.message); }
            };
            reader.onerror = function(){ alert("❌ Ralat membaca fail."); };
            reader.readAsText(file);
        }

            let errorDiv = document.getElementById('loginError');

            options.forEach(opt => {
                if (opt.getAttribute("data-role") === role) opt.classList.add('active');
                else opt.classList.remove('active');
            });
            
            if(role === 'guru') {
                guruForm.style.display = 'block';
                pelajarForm.style.display = 'none';

                guruForm.style.display = 'none';

            }
        }

        // Override renderCurrentPage untuk pelajar
        let originalRenderCurrentPage = renderCurrentPage;
        renderCurrentPage = function() {
            if(currentUser && currentUser.role === 'pelajar') {
                let p = document.querySelector(".page.active-page");
                if(p && p.id !== 'profilPage') {
                    document.querySelectorAll('.nav-item').forEach(item => item.classList.remove('active'));
                    document.querySelectorAll('.page').forEach(pg => pg.classList.remove('active-page'));
                    document.getElementById('profilPage').classList.add('active-page');
                    document.querySelector('.nav-item[data-page="profil"]').classList.add('active');
                }
                renderProfilForStudent();
                renderIntervensi();
                setSystemControlsLocked();
                setAdminNavVisibility();
                maybeNotifyGuruAdminExpiry();
                return;
            }

            if(currentUser && currentUser.role === 'guru' && isGuruLockedByAdmin()) {
                let p = document.querySelector(".page.active-page");
                if(p && p.id === 'adminPage') {
                    renderAdmin();
                    applyAdminSettingsUI();
                    renderIntervensi();
                    setSystemControlsLocked();
                    setAdminNavVisibility();
                    maybeNotifyGuruAdminExpiry();
                    return;
                }
                if(!p || p.id === 'adminPage') {
                    document.querySelectorAll('.nav-item').forEach(item => item.classList.remove('active'));
                    document.querySelectorAll('.page').forEach(pg => pg.classList.remove('active-page'));
                    document.getElementById('dashboardPage').classList.add('active-page');
                    document.querySelector('.nav-item[data-page="dashboard"]').classList.add('active');
                    p = document.getElementById('dashboardPage');
                }
                renderLockedContent(p.id);
                renderIntervensi();
                setSystemControlsLocked();
                setAdminNavVisibility();
                maybeNotifyGuruAdminExpiry();
                return;
            }

            if(currentUser && currentUser.role === 'guru' && !isGuruLockedByAdmin()) {
                setSystemControlsLocked();
                setAdminNavVisibility();
                originalRenderCurrentPage();
                applyAdminSettingsUI();
                maybeNotifyGuruAdminExpiry();
                return;
            } else {
                originalRenderCurrentPage();
            }
            setSystemControlsLocked();
            setAdminNavVisibility();
            applyAdminSettingsUI();
            maybeNotifyGuruAdminExpiry();
        };

        setTimeout(() => {
            addLogoutButton();
            checkLogin();
            setInterval(maybeNotifyGuruAdminExpiry, 60000);
        }, 100);
        // ==================== BACKUP & RESTORE FUNCTIONS ====================
        function backupData() {
            let backup = {
                version: "1.0",
                date: new Date().toLocaleString('ms-MY'),
                allData: allData,
                allSubjects: allSubjects,
                allClasses: allClasses,
                masterWeeks: masterWeeks,
                bookMonths: bookMonths,
                pbdData: pbdData,
                dskpDatabase: dskpDatabase,
                itemConfigGlobal: itemConfigGlobal,
                adminSystemLock: adminSystemLock
            };
            
            let dataStr = JSON.stringify(backup, null, 2);
            let dataUri = 'data:application/json;charset=utf-8,' + encodeURIComponent(dataStr);
            let fileName = `EduTrack_Backup_${new Date().toISOString().slice(0,19).replace(/:/g, '-')}.json`;
            
            let linkElement = document.createElement('a');
            linkElement.setAttribute('href', dataUri);
            linkElement.setAttribute('download', fileName);
            linkElement.click();
            
            alert('✅ Backup berjaya! Fail disimpan sebagai: ' + fileName);
        }
        
        function restoreData(file) {
            if(!file) return;
            
            let reader = new FileReader();
            reader.onload = function(e) {
                try {
                    let backup = JSON.parse(e.target.result);
                    
                    if(!backup.allData || !backup.allSubjects || !backup.allClasses) {
                        throw new Error('Format fail backup tidak sah!');
                    }
                    
                    allData = backup.allData;
                    allSubjects = backup.allSubjects;
                    allClasses = backup.allClasses;
                    masterWeeks = backup.masterWeeks || masterWeeks;
                    bookMonths = backup.bookMonths || bookMonths;
                    pbdData = backup.pbdData || {};
                    dskpDatabase = backup.dskpDatabase || {};
                    itemConfigGlobal = backup.itemConfigGlobal || {};
                    adminSystemLock = backup.adminSystemLock || { mode: "manual", enabled: false, untilDate: "", startAt: "", endAt: "" };
                    
                    saveAll();
                    refreshSelectors();
                    renderCurrentPage();
                    refreshSettingsSelects();
                    
                    alert('✅ Restore berjaya!');
                } catch(err) {
                    alert('❌ Ralat: Fail backup tidak sah!\\n' + err.message);
                }
            };
            reader.readAsText(file);
        }
    </script>
</body>
